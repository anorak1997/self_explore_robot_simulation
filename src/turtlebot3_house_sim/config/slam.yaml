slam_toolbox:
  ros__parameters:

    use_sim_time: true

    odom_frame: odom
    map_frame: map
    base_frame: base_footprint

    scan_topic: /scan/out

    mode: mapping

    resolution: 0.05

    minimum_travel_distance: 0.1
    minimum_travel_heading: 0.1

    map_update_interval: 2.0

    max_laser_range: 20.0